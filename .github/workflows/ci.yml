name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  # Lets the pixel-diff job (and others) be invoked manually with a
  # one-click trigger from the Actions UI.
  workflow_dispatch:

concurrency:
  # Cancel in-progress runs for the same branch when new commits arrive.
  # The main branch is never cancelled, so release builds always complete.
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  typecheck-and-unit:
    name: Typecheck + Bun tests
    # macOS because the PTY tests spawn real shells and exercise macOS
    # ps/lsof output parsers. Linux would need additional shim
    # behavior we don't ship yet.
    runs-on: macos-14
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Unit + integration tests
        # Don't run with DEBUG=* etc. — the noisy [session] / [web]
        # logs are already captured by bun:test on failure.
        run: bun test

  e2e-web-mirror:
    name: Playwright web-mirror e2e
    # The e2e boot script spawns a Bun subprocess that runs the real
    # WebServer + SessionManager. macOS is required for the same
    # reason as above (PTY/ps/lsof behavior).
    runs-on: macos-14
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build web-client bundle
        # Playwright loads the bundled /assets/web-client/client.js
        # via the real WebServer, so the bundle has to exist before
        # tests run. `bun run test` already builds it, but the e2e
        # runner does not, so we call the build step explicitly.
        run: bun scripts/build-web-client.ts

      - name: Install Playwright browsers
        # --with-deps would also install OS-level libraries; on macOS
        # runners Chromium ships with everything it needs, so plain
        # install keeps the step fast.
        run: bunx playwright install chromium

      - name: Run Playwright tests
        # CI=1 is picked up by playwright.config.ts to enable retries
        # and reduce worker count.
        env:
          CI: "1"
        run: bun run test:e2e

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          retention-days: 14
          if-no-files-found: ignore

  e2e-native:
    name: Playwright native Electrobun e2e
    # Drives the real Electrobun app (bun start / dev build) with isolated
    # HT_CONFIG_DIR per worker (doc/native-e2e-plan.md §5 + §8). macOS is
    # required — Electrobun targets macOS and sessions spawn zsh.
    runs-on: macos-14
    timeout-minutes: 20
    needs: [typecheck-and-unit]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install Playwright (no browsers needed — native only)
        # The native e2e fixture does not launch a browser; we still need
        # the @playwright/test runner binaries that ship with the package.
        run: bunx playwright install-deps || true

      - name: Audit Tier 2 test hooks (dual-fact gate)
        # Verifies static + runtime gating for the `__test.*` RPC family
        # (doc/native-e2e-plan.md §6.5). Any regression here means the
        # test hooks could become reachable without HYPERTERM_TEST_MODE.
        run: bun run audit:test-hooks

      - name: Audit emoji (τ-mux design guideline §0)
        # The τ-mux design guideline bans emoji code points in chrome.
        # This check fails if any appear in src/views/terminal, src/bun,
        # or src/shared. Lines carrying user content (not chrome) can
        # opt out with `// emoji-audit-ignore-line`.
        run: bun run audit:emoji

      - name: Audit animations (τ-mux design guideline §10)
        # Fails if index.css defines a keyframe that is neither a §10
        # canonical animation (tauBlink / tauPulse / tauGlowPulse /
        # tauDash / tauTickerScroll + documented τ-mux extensions)
        # nor on the state-exception allowlist inside the script.
        run: bun run audit:animations

      - name: Run native Playwright tests
        env:
          CI: "1"
        run: bun run test:native

      - name: Upload screenshots + logs on failure
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: native-e2e-artifacts
          path: |
            test-results/
            playwright-report/
          retention-days: 14
          if-no-files-found: ignore

  e2e-screenshot-diff:
    name: Pixel-diff screenshots (opt-in)
    # Runs only when a PR gets the `screenshot-diff` label or on manual
    # dispatch. Compares the PR's design-review screenshots against a
    # baseline from `main`. Lives behind an opt-in label because pixel
    # diffs are noisy on CI (font smoothing, accent colour) and would
    # burn reviewer time if run on every PR.
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'pull_request' &&
       contains(github.event.pull_request.labels.*.name, 'screenshot-diff'))
    runs-on: macos-14
    timeout-minutes: 25
    needs: [e2e-native]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install Playwright
        run: bunx playwright install chromium

      # Baseline acquisition: on PR builds, fetch the most recent
      # artifact from main. On workflow_dispatch, skip — the runner
      # will produce a fresh baseline from HEAD.
      - name: Download baseline from main
        if: github.event_name == 'pull_request'
        uses: dawidd6/action-download-artifact@v3
        with:
          workflow: ci.yml
          branch: main
          name: screenshot-baseline
          path: .screenshot-baseline
        continue-on-error: true

      - name: Generate baseline from current ref
        # Runs on every invocation of this job; on PR builds the
        # `.screenshot-baseline/` dir is already populated by the
        # download step above, so this takes the PR's current state
        # as the "current" half of the diff.
        run: |
          bun run test:native:design-review
          if [ ! -d .screenshot-baseline ]; then
            bun run screenshots:baseline
            echo "[diff] no prior baseline — created one from HEAD"
          fi

      - name: Diff screenshots
        run: bun run screenshots:diff || true

      - name: Upload diff report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshot-diff
          path: test-results/screenshot-diff/
          retention-days: 30
          if-no-files-found: ignore

      - name: Upload baseline (for future PRs)
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: screenshot-baseline
          path: .screenshot-baseline/
          retention-days: 90
          if-no-files-found: ignore

  e2e-native-packaged:
    name: Playwright native e2e (packaged .app)
    # Validates the release path end-to-end: runs the tests against the
    # built .app binary rather than `electrobun dev`. Catches postBuild
    # CLI-inject failures, missing Resources, and launcher-vs-bun ABI
    # regressions that the dev build masks.
    #
    # Gated to release tags + manual dispatch — the build step takes a
    # couple of minutes, too slow for per-PR.
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
    runs-on: macos-14
    timeout-minutes: 30
    needs: [e2e-native]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build packaged .app
        run: bun run build:stable

      - name: Audit Tier 2 test hooks against the packaged bundle
        # In addition to the static + runtime gate checks, `--strict-bundle`
        # greps the packaged JS for `"__test.` and fails if any remain.
        # Once the build-time `HYPERTERM_INCLUDE_TEST_HOOKS=0` gate is
        # verified end-to-end, this locks in the tree-shake.
        run: bun run audit:test-hooks -- --bundle

      - name: Run native tests against packaged binary
        env:
          CI: "1"
          HT_E2E_APP: packaged
        run: bun run test:native

      - name: Upload packaged e2e artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: native-e2e-packaged-artifacts
          path: |
            test-results/
            playwright-report/
          retention-days: 30
          if-no-files-found: ignore
