name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  # Lets the job be invoked manually with a one-click trigger from the
  # Actions UI.
  workflow_dispatch:

concurrency:
  # Cancel in-progress runs for the same branch when new commits arrive.
  # The main branch is never cancelled, so release builds always complete.
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  typecheck-and-unit:
    name: Typecheck + Bun tests
    # macOS because the PTY tests spawn real shells and exercise macOS
    # ps/lsof output parsers. Linux would need additional shim
    # behavior we don't ship yet.
    runs-on: macos-14
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Unit + integration tests
        # Don't run with DEBUG=* etc. — the noisy [session] / [web]
        # logs are already captured by bun:test on failure.
        run: bun test

  # Playwright e2e suites (web-mirror, native, packaged-app, screenshot-diff)
  # were removed from CI on 2026-04-27. They were authored against pixel
  # baselines that drift on the GitHub runner's font smoothing / accent
  # rendering — green locally, red in CI. Re-introduce when the suites are
  # robust against runner rendering differences. The scripts themselves
  # remain on disk: `bun run test:e2e`, `bun run test:native`,
  # `bun run test:native:packaged`, `bun run report:design`.
