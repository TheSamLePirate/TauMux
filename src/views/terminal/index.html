<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>τ-mux</title>
    <link rel="stylesheet" href="xterm.css" />
    <link rel="stylesheet" href="index.css" />
  </head>
  <body>
    <div id="titlebar" class="electrobun-webkit-app-region-drag">
      <div id="titlebar-leading" class="titlebar-section">
        <div
          id="titlebar-app-icon"
          class="titlebar-app-icon electrobun-webkit-app-region-no-drag"
          role="img"
          aria-label="τ-mux"
          title="τ-mux"
        ></div>
        <button
          id="sidebar-toggle-btn"
          class="toolbar-icon-btn electrobun-webkit-app-region-no-drag"
          type="button"
          aria-label="Toggle sidebar"
          title="Toggle Sidebar"
        ></button>
        <div id="titlebar-copy">
          <div id="titlebar-text">τ-mux</div>
        </div>
      </div>
      <div id="titlebar-center" class="titlebar-section">
        <div id="titlebar-badge" class="titlebar-info titlebar-info-primary">
          <span class="icon-slot" data-icon="workspace"></span>
          <span id="titlebar-badge-text">No Workspace</span>
        </div>
        <div id="toolbar-workspace-count" class="titlebar-info">
          <span class="icon-slot" data-icon="folder"></span>
          <span id="toolbar-workspace-count-label">0 workspaces</span>
        </div>
        <div id="toolbar-pane-count" class="titlebar-info">
          <span class="icon-slot" data-icon="pane"></span>
          <span id="toolbar-pane-count-label">0 panes</span>
        </div>
      </div>
      <!-- τ-mux §9.1 Bridge variant: segmented workspace switcher pills.
           Hidden by default; shown only when body[data-tau-variant="bridge"].
           Populated by refreshBridgeSwitcher() on every workspace change. -->
      <div
        id="tau-workspace-switcher"
        class="tau-workspace-switcher electrobun-webkit-app-region-no-drag"
        role="tablist"
        aria-label="Workspace"
      ></div>
      <div id="titlebar-actions" class="titlebar-section electrobun-webkit-app-region-no-drag">
        <div class="toolbar-icon-strip electrobun-webkit-app-region-no-drag">
          <button
            id="command-palette-btn"
            class="toolbar-icon-btn electrobun-webkit-app-region-no-drag"
            type="button"
            aria-label="Open command palette"
            title="Command Palette"
          ></button>
          <button
            id="new-workspace-btn"
            class="toolbar-icon-btn electrobun-webkit-app-region-no-drag"
            type="button"
            aria-label="New workspace"
            title="New Workspace"
          ></button>
          <button
            id="split-right-btn"
            class="toolbar-icon-btn electrobun-webkit-app-region-no-drag"
            type="button"
            aria-label="Split right"
            title="Split Right"
          ></button>
          <button
            id="split-down-btn"
            class="toolbar-icon-btn electrobun-webkit-app-region-no-drag"
            type="button"
            aria-label="Split down"
            title="Split Down"
          ></button>
        </div>
      </div>
    </div>
    <div id="sidebar"></div>
    <div id="terminal-container"></div>
    <!-- τ-mux §8.3 status bar. Populated by StatusBar primitive
         (Phase 4). 26 px tall, Mono 11, textDim; items separated by
         middle dots in textFaint. Zones from left→right: identity ·
         usage meters · (flex) · cost / model. -->
    <div id="tau-status-bar" class="tau-status-bar tau-mono" role="status" aria-live="polite"></div>
    <script type="module" src="index.js"></script>
  </body>
</html>
