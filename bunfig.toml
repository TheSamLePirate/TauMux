# Scope `bun test` to the tests/ directory.
#
# Without this, bun also walks tests-e2e/ and tries to execute
# Playwright specs — which blow up with "test.describe() called here"
# because @playwright/test's runner hasn't initialized. `bun run test`
# already passes `tests/` explicitly; this makes the bare `bun test`
# command behave the same.
[test]
root = "./tests"
# J.1 / T1 — when `bun test --coverage` is invoked, exclude tests
# themselves and tooling from the coverage report so the headline
# number reflects production-code coverage, not "test files cover
# themselves 100 %". Bun auto-excludes node_modules.
coveragePathIgnorePatterns = [
  "tests/",
  "tests-e2e/",
  "tests-e2e-native/",
  "scripts/",
]
